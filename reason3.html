<!DOCTYPE html>
<html>
<head>
  <title>Why are you opening this?</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 100px auto;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>Why are you opening YouTube?</h2>

<textarea id="reason" placeholder="Be honest..."></textarea><br>

<button onclick="proceed()">Continue</button>

<button onclick="clearHistory()">Clear history</button>
  
<script>
  <script>
function proceed() {
  const text = document.getElementById("reason").value.trim();
  if (text.length < 10) {
    alert("Write a real reason (at least 10 characters).");
    return;
  }

  const now = new Date();
  const datePart = [
    String(now.getDate()).padStart(2, '0'),
    String(now.getMonth() + 1).padStart(2, '0'),
    now.getFullYear()
  ].join('.');
  const timePart = now.toLocaleTimeString();

  let history = JSON.parse(localStorage.getItem("reasons") || "[]");
  history.push({
    text: text,
    time: `${datePart} ${timePart}`
  });
  localStorage.setItem("reasons", JSON.stringify(history));
  window.location.href = "https://www.youtube.com";
}

function clearHistory() {
  if (confirm("Clear all saved reasons?")) {
    localStorage.removeItem("reasons");
    localStorage.removeItem("last_reason");
    location.reload();
  }
}

window.onload = function() {
  let history = JSON.parse(localStorage.getItem("reasons") || "[]");
  let html = "<h3>History:</h3>";
  history.slice().reverse().forEach(r => {
    html += `<p><b>${r.time}</b>: ${r.text}</p>`;
  });
  document.body.innerHTML += html;
};
</script>

  
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Why are you opening this?</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 100px auto;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>Why are you opening YouTube?</h2>

<textarea id="reason" placeholder="Be honest..."></textarea><br>

<button onclick="proceed()">Continue</button>
<button onclick="clearHistory()">Clear history</button>
<script>
function proceed() {
  const text = document.getElementById("reason").value.trim();

  if (text.length < 10) {
    alert("Write a real reason (at least 10 characters).");
    return;
  }

  //let history = JSON.parse(localStorage.getItem("reasons") || "[]");


  let history = JSON.parse(localStorage.getItem("reasons") || "[]");

const now = new Date();
const day = String(now.getDate()).padStart(2, '0');
const month = String(now.getMonth() + 1).padStart(2, '0');
const year = String(now.getFullYear()).slice(2);
const hours = now.getHours();
const minutes = String(now.getMinutes()).padStart(2, '0');
const ampm = hours >= 12 ? 'PM' : 'AM';
const formattedHours = hours % 12 || 12;
const formattedTime = `${day}.${month}.${year}, ${formattedHours}:${minutes}${ampm}`;

history.push({
  text: text,
  time: formattedTime
});

//  history.push({
//    text: text,
//    time: new Date().toLocaleString()
//  });

  localStorage.setItem("reasons", JSON.stringify(history));

  window.location.href = "https://www.youtube.com";
}

//clear history
function clearHistory() {
  if (confirm("Clear all saved reasons?")) {
    localStorage.removeItem("reasons");
    localStorage.removeItem("last_reason");
    location.reload();
  }
}

// Show history
window.onload = function() {
  let history = JSON.parse(localStorage.getItem("reasons") || "[]");

  let html = "<h3>History:</h3>";
  history.slice().reverse().forEach(r => {
    html += `<p><b>${r.time}</b>: ${r.text}</p>`;
  });

  document.body.innerHTML += html;
};
</script>

</body>
</html>
